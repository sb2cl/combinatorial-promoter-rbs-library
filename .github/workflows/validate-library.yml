name: validate-library

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate GenBank ↔ table consistency
        run: |
          python scripts/validate_library.py --table metadata/library_table_from_paper.csv --genbank-dir genbank
      - name: Regenerate SBOL3 files
        run: |
          python scripts/make_sbol_library.py --base-uri "https://github.com/sb2cl/combinatorial-promoter-rbs-library/" --table metadata/library_table_from_paper.csv --genbank-dir genbank --outdir sbol
